<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caseta: Escáner IBEA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e2530;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #2a3444;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #4b5563;
            margin-bottom: 15px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #4b5563; color: white; }
        .btn-secondary:hover { background: #374151; }
        
        /* Contenedores de captura de evidencias */
        .panel-visita {
            background: #3b82f6;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: left;
        }
        .panel-visita h3 { margin-top: 0; text-align: center; font-size: 22px; }
        .panel-visita p { text-align: center; font-size: 14px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border-radius: 6px; border: none; box-sizing: border-box; font-size: 15px; }
        
        .btn-foto {
            background: #1f2937; color: #f9fafb; border: 2px dashed #9ca3af; display: flex;
            align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px;
        }
        .btn-foto.capturada { border: 2px solid #10b981; background: #064e3b; }

        /* Controles de cámara adicionales */
        .cam-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="wrapperEscaner">
        <h2 id="tituloHeader">Caseta: Escáner IBEA</h2>
        
        <div class="cam-controls" id="areaControlesCamara" style="display: none;">
            <button class="btn btn-secondary" style="padding: 8px; font-size: 13px; margin: 0;" onclick="alternarCamara()">🔄 Cambiar Lente Trasera</button>
        </div>

        <div id="reader"></div>
        <button id="btnIniciar" class="btn btn-primary" onclick="iniciarEscaner()">Activar Cámara de Caseta</button>
    </div>

    <div id="panelEvidencias" class="panel-visita" style="display: none;">
        <h3>PASE DE VISITA VÁLIDO</h3>
        <p>Toma las evidencias correspondientes abajo para abrir la pluma.</p>
        
        <div class="form-group">
            <label>Calle Destino</label>
            <input type="text" id="evCalle" readonly>
        </div>
        <div class="form-group">
            <label>Número Destino</label>
            <input type="text" id="evNumero" readonly>
        </div>
        <div class="form-group">
            <label>Nombre del Visitante</label>
            <input type="text" id="evNombre" placeholder="Escribe el nombre de la INE">
        </div>

        <button class="btn btn-foto" id="btnIne" onclick="capturarEvidencia('ine')">🪪 Tomar Foto de la INE</button>
        <button class="btn btn-foto" id="btnCarro" onclick="capturarEvidencia('carro')">🚗 Tomar Foto del Carro / Placas</button>

        <button class="btn btn-success" style="margin-top: 15px;" onclick="guardarEntradaCaseta()">GUARDAR ENTRADA</button>
        <button class="btn btn-secondary" onclick="regresarAlEscaner()">🔄 Escanear Siguiente</button>
    </div>
</div>

<input type="file" id="inputCamaraNativa" accept="image/*" capture="environment" style="display: none;">
