<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Acceso Caseta - IBEA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e272e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #2f3640;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h2 { text-align: center; margin-top: 0; color: #f5f6fa; font-size: 22px; }
        
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 2px dashed #718093;
            background: #22272e;
            display: none; /* Oculto por defecto, solo se usa si no hay datos en la URL */
        }
        
        #reader__dashboard_section_csr, #reader__status_span { display: none !important; }
        #reader button {
            background-color: #3498db; color: white; border: none; padding: 12px;
            border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0;
        }

        .result-screen {
            display: none;
            margin-top: 20px;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .status-title { font-size: 26px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .status-desc { font-size: 16px; line-height: 1.4; margin-bottom: 15px; }
        
        .bg-verde { background-color: #2ecc71; color: #fff; }
        .bg-naranja { background-color: #e67e22; color: #fff; }
        .bg-rojo { background-color: #e74c3c; color: #fff; }
        .bg-azul { background-color: #3498db; color: #fff; }
        .bg-error { background-color: #7f8c8d; color: #fff; }

        .capture-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: left;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #f5f6fa; }
        .form-group input {
            width: 100%; padding: 10px; border: none; border-radius: 5px;
            box-sizing: border-box; font-size: 15px; background: #fff; color: #333;
        }
        .form-group input[readonly] { background: #dcdde1; color: #2f3640; font-weight: bold; }

        .camera-btn-wrapper {
            position: relative; margin-bottom: 15px; background: #2f3640;
            border: 2px dashed #fff; border-radius: 6px; padding: 12px; text-align: center; cursor: pointer;
        }
        .camera-btn-wrapper input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }
        .camera-label { font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .preview-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 5px; margin-top: 8px; display: none; }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 6px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .btn-submit { background-color: #2ecc71; color: white; text-transform: uppercase; }
        .btn-submit:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .btn-reset { background-color: #7f8c8d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Caseta: Control IBEA</h2>
    
    <div id="reader"></div>
    
    <div id="resultScreen" class="result-screen">
        <div id="statusTitle" class="status-title">Estatus</div>
        <div id="statusDesc" class="status-desc">Detalles del escaneo.</div>
        
        <div id="visitaFormContainer" style="display: none;">
            <div class="capture-form">
                <div class="form-group">
                    <label>Calle Destino</label>
                    <input type="text" id="formCalle" readonly>
                </div>
                <div class="form-group">
                    <label>Número Destino</label>
                    <input type="text" id="formNumero" readonly>
                </div>
                <div class="form-group">
                    <label>Nombre del Visitante</label>
                    <input type="text" id="formNombre" placeholder="Escribe el nombre de la INE">
                </div>

                <div class="camera-btn-wrapper">
                    <div class="camera-label">🪪 Tomar Foto de la INE</div>
                    <input type="file" id="camIne" accept="image/*" capture="environment" onchange="procesarFoto(this, 'previewIne')">
                    <img id="previewIne" class="preview-img">
                </div>

                <div class="camera-btn-wrapper">
                    <div class="camera-label">🚗 Tomar Foto del Carro / Placas</div>
                    <input type="file" id="camCarro" accept="image/*" capture="environment" onchange="procesarFoto(this, 'previewCarro')">
                    <img id="previewCarro" class="preview-img">
                </div>

                <button id="btnEnviarRegistro" class="btn btn-submit" onclick="enviarRegistroAExcel()">Guardar Entrada</button>
            </div>
        </div>

        <button class="btn btn-reset" onclick="reiniciarEscaner()">🔄 Escanear Siguiente</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzom1ISxqtJouPi8JpsTpQoEjtK1faKM70HQNDELzmdtA53LWP0bElyPzOmdRd1f_ka/exec";

    let html5Qrcode;
    let datosFotosBase64 = { fotoIne: null, fotoCarro: null };

    // Función principal que decide si procesa los datos del link o activa la cámara
    function verificarRutaDeEntrada() {
        const urlParams = new URLSearchParams(window.location.search);
        const tipo = urlParams.get("t");

        // SI LA URL YA TRAE DATOS (El guardia escaneó el QR desde afuera con su cel)
        if (tipo) {
            procesarDatosDeURL(urlParams);
        } else {
            // SI LA URL ESTÁ VACÍA (Entró directo a la web o es el siguiente escaneo)
            activarEscanerEnPantalla();
        }
    }

    // Lee los datos directo del enlace saltándose el escáner interno
    function procesarDatosDeURL(params) {
        const tipo = params.get("t");
        const nombre = params.get("n") || "";
        const calle = params.get("c") || "";
        const numero = params.get("num") || "";
        const hashRecibido = params.get("h") || "";

        const stringFirma = calle.trim().toLowerCase() + "-" + numero.trim().toLowerCase();
        const hashCalculado = btoa(stringFirma).replace(/=/g, "");

        if (hashRecibido !== hashCalculado) {
            mostrarPantalla("bg-rojo", "QR INVÁLIDO", "Este código QR no pertenece al sistema original de Ibea.");
            return;
        }

        if (tipo === "r") {
            mostrarPantalla("bg-verde", "ACCESO AUTORIZADO", `RESIDENTE: AL CORRIENTE<br><br><strong>Propietario:</strong> ${nombre}<br><strong>Domicilio:</strong> ${calle} #${numero}`);
        } else if (tipo === "v") {
            mostrarPantalla("bg-azul", "PASE DE VISITA VÁLIDO", `Domicilio: ${calle} #${numero}<br>Llena los datos abajo para permitir el acceso.`);
            
            document.getElementById("formCalle").value = calle;
            document.getElementById("formNumero").value = numero;
            document.getElementById("formNombre").value = "";
            document.getElementById("previewIne").style.display = "none";
            document.getElementById("previewCarro").style.display = "none";
            datosFotosBase64 = { fotoIne: null, fotoCarro: null };
            
            document.getElementById("visitaFormContainer").style.display = "block";
        } else {
            mostrarPantalla("bg-error", "QR NO RECONOCIDO", "Formato no compatible.");
        }
    }

    // Solo se activa si el guardia necesita usar el escáner interno de la app
    function activarEscanerEnPantalla() {
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("reader").style.display = "block";
        
        html5Qrcode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5Qrcode.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
                html5Qrcode.stop().then(() => {
                    const urlObj = new URL(decodedText);
                    procesarDatosDeURL(urlObj.searchParams);
                }).catch(() => {
                    const urlObj = new URL(decodedText);
                    procesarDatosDeURL(urlObj.searchParams);
                });
            },
            () => {}
        ).catch(err => console.log("Cámara lista."));
    }

    function mostrarPantalla(claseBg, titulo, descripcion) {
        document.getElementById("reader").style.display = "none";
        const screen = document.getElementById("resultScreen");
        screen.className = "result-screen " + claseBg;
        document.getElementById("statusTitle").innerText = titulo;
        document.getElementById("statusDesc").innerHTML = descripcion;
        document.getElementById("visitaFormContainer").style.display = "none";
        screen.style.display = "block";
    }

    function procesarFoto(input, idPreview) {
        if (input.files && input.files[0]) {
            const lector = new FileReader();
            lector.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    const maxAncho = 800;
                    const escala = maxAncho / img.width;
                    canvas.width = maxAncho;
                    canvas.height = img.height * escala;
                    
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64Comprimido = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
                    
                    if (idPreview === 'previewIne') datosFotosBase64.fotoIne = { base64: base64Comprimido };
                    if (idPreview === 'previewCarro') datosFotosBase64.fotoCarro = { base64: base64Comprimido };

                    const preview = document.getElementById(idPreview);
                    preview.src = canvas.toDataURL("image/jpeg", 0.7);
                    preview.style.display = "block";
                };
                img.src = e.target.result;
            };
            lector.readAsDataURL(input.files[0]);
        }
    }

    function enviarRegistroAExcel() {
        const btn = document.getElementById("btnEnviarRegistro");
        const nombreVisita = document.getElementById("formNombre").value.trim();
        const calle = document.getElementById("formCalle").value;
        const numero = document.getElementById("formNumero").value;

        if(!nombreVisita) {
            alert("Por favor escribe el nombre de la visita.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Guardando en Excel...";

        const urlEnvio = `${WEB_APP_URL}?calle=${encodeURIComponent(calle)}&numero=${encodeURIComponent(numero)}&nombre=${encodeURIComponent(nombreVisita)}`;

        fetch(urlEnvio, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datosFotosBase64)
        })
        .then(() => {
            alert("¡Registro guardado con éxito!");
            reiniciarEscaner();
        })
        .catch(err => {
            alert("Error al guardar: " + err);
            btn.disabled = false;
            btn.innerText = "Guardar Entrada";
        });
    }

    function reiniciarEscaner() {
        // Limpiamos los parámetros de la barra de direcciones para que no vuelva a cargar la misma casa
        window.history.replaceState({}, document.title, window.location.pathname);
        activarEscanerEnPantalla();
    }

    // Arranca revisando si viene de un escaneo externo
    window.onload = verificarRutaDeEntrada;
</script>
</body>
</html>
