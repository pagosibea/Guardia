<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caseta: Escáner IBEA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e2530;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #2a3444;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #4b5563;
            margin-bottom: 15px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #4b5563; color: white; }
        .btn-secondary:hover { background: #374151; }
        
        .panel-visita {
            background: #3b82f6;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: left;
        }
        .panel-visita h3 { margin-top: 0; text-align: center; font-size: 22px; }
        .panel-visita p { text-align: center; font-size: 14px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border-radius: 6px; border: none; box-sizing: border-box; font-size: 15px; }
        
        .btn-foto {
            background: #1f2937; color: #f9fafb; border: 2px dashed #9ca3af; display: flex;
            flex-direction: column; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px;
            height: auto; min-height: 55px; padding: 10px;
        }
        .btn-foto.capturada { border: 2px solid #10b981; background: #064e3b; }

        .img-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 6px;
            margin-top: 5px;
            border: 1px solid #10b981;
            object-fit: contain;
        }

        .cam-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 37, 48, 0.85);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            border: 6px solid #2a3444;
            border-top: 6px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            font-family: sans-serif;
        }

        .panel-residente {
            background: #10b981;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
            border: 2px solid #047857;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }
        .panel-residente h3 { margin-top: 0; font-size: 24px; color: #ffffff; letter-spacing: 1px; }
        .badge-verificado {
            background: #ffffff; color: #10b981; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 15px;
        }
        .residente-info-card {
            background: #064e3b; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 15px;
        }
        .residente-info-row { margin-bottom: 10px; }
        .residente-info-row:last-child { margin-bottom: 0; }
        .residente-label { font-size: 12px; color: #a7f3d0; display: block; font-weight: 600; text-transform: uppercase; }
        .residente-val { font-size: 16px; color: #ffffff; font-weight: bold; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">SINCRO-REGISTRO EN HOJA...</div>
</div>

<div class="container">
    <div id="wrapperEscaner">
        <h2 id="tituloHeader">Caseta: Escáner IBEA</h2>
        
        <div class="cam-controls" id="areaControlesCamara" style="display: none;">
            <button class="btn btn-secondary" style="padding: 8px; font-size: 13px; margin: 0;" onclick="alternarCamara()">🔄 Cambiar Lente Trasera</button>
        </div>

        <div id="reader"></div>
        <button id="btnIniciar" class="btn btn-primary" onclick="iniciarEscaner()">Activar Cámara de Caseta</button>
    </div>

    <div id="panelResidente" class="panel-residente" style="display: none;">
        <h3>ACCESO AUTORIZADO</h3>
        <div class="badge-verificado">✓ RESIDENTE ACTIVO</div>
        
        <div class="residente-info-card">
            <div class="residente-info-row">
                <span class="residente-label">Propietario / Residente</span>
                <span id="resNombre" class="residente-val">-</span>
            </div>
            <div class="residente-info-row">
                <span class="residente-label">Domicilio</span>
                <span id="resDomicilio" class="residente-val">-</span>
            </div>
            <div class="residente-info-row">
                <span class="residente-label">Validación de Acceso</span>
                <span id="resFechaHora" class="residente-val" style="color: #fef08a;">-</span>
            </div>
        </div>

        <button class="btn btn-success" style="background: #ffffff; color: #064e3b;" onclick="regresarAlEscaner(true)">ACEPTAR Y CONTINUAR</button>
    </div>

    <div id="panelEvidencias" class="panel-visita" style="display: none;">
        <h3>PASE DE VISITA VÁLIDO</h3>
        <p>Toma las evidencias correspondientes abajo para abrir la pluma.</p>
        
        <div class="form-group">
            <label>Calle Destino</label>
            <input type="text" id="evCalle" readonly>
        </div>
        <div class="form-group">
            <label>Número Destino</label>
            <input type="text" id="evNumero" readonly>
        </div>
        <div class="form-group">
            <label>Nombre del Visitante</label>
            <input type="text" id="evNombre" placeholder="Escribe el nombre de la INE">
        </div>

        <button class="btn btn-foto" id="btnIne" onclick="capturarEvidencia('ine')">
            <span>🪪 Tomar Foto de la INE</span>
        </button>
        <button class="btn btn-foto" id="btnCarro" onclick="capturarEvidencia('carro')">
            <span>🚗 Tomar Foto del Carro / Placas</span>
        </button>

        <button class="btn btn-success" style="margin-top: 15px;" onclick="guardarEntradaCaseta()">GUARDAR ENTRADA</button>
        <button class="btn btn-secondary" onclick="regresarAlEscaner(false)">🔄 Escanear Siguiente</button>
    </div>
</div>

<input type="file" id="inputCamaraNativa" accept="image/*" capture="environment" style="display: none;">

<script>
    // RECUERDA: Si generaste una nueva implementación del script, pega la nueva URL aquí abajo
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbysNDnhR4cWOiL16TWmTdivjKQmhkXpd1NhKVksi4kMrnxQG3TbjJS4X6ypfOs6y0WQ/exec";

    let html5QrcodeScanner = null;
    let camarasDisponibles = [];
    let indiceCamaraActual = 0;
    let datosPaseActual = null;
    let fotosCapturadas = { ine: null, carro: null };
    let tipoEvidenciaActual = '';

    function iniciarEscaner() {
        document.getElementById('btnIniciar').style.display = 'none';
        
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0) {
                camarasDisponibles = devices.filter(device => {
                    const label = device.label.toLowerCase();
                    return !(label.includes('front') || label.includes('delantera') || label.includes('selfie') || label.includes('user'));
                });

                if (camarasDisponibles.length === 0) {
                    camarasDisponibles = devices;
                }

                let indiceOptimo = 0;
                for (let i = 0; i < camarasDisponibles.length; i++) {
                    const label = camarasDisponibles[i].label.toLowerCase();
                    if (label.includes('back') || label.includes('trasera') || label.includes('main') || label.includes('principal')) {
                        if (!label.includes('wide') && !label.includes('angular') && !label.includes('macro')) {
                            indiceOptimo = i;
                            break;
                        }
                    }
                }
                
                indiceCamaraActual = indiceOptimo;
                
                if (camarasDisponibles.length > 1) {
                    document.getElementById('areaControlesCamara').style.display = 'block';
                } else {
                    document.getElementById('areaControlesCamara').style.display = 'none';
                }
                
                encenderLente(camarasDisponibles[indiceCamaraActual].id);
            } else {
                alert("No se detectaron cámaras en este dispositivo.");
                document.getElementById('btnIniciar').style.display = 'block';
            }
        }).catch(err => {
            console.error("Error al listar cámaras:", err);
            alert("Error al acceder a los permisos de la cámara.");
            document.getElementById('btnIniciar').style.display = 'block';
        });
    }

    function encenderLente(cameraId) {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                setTimeout(() => montarLente(cameraId), 300);
            }).catch(() => {
                setTimeout(() => montarLente(cameraId), 300);
            });
        } else {
            montarLente(cameraId);
        }
    }

    function montarLente(cameraId) {
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
            cameraId,
            { fps: 15, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            onScanFailure
        ).catch(err => {
            console.error("Error al iniciar cámara seleccionada:", err);
            setTimeout(() => {
                 html5QrcodeScanner.start(cameraId, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanFailure).catch(e => console.log("Fallo reintento"));
            }, 500);
        });
    }

    function alternarCamara() {
        if (camarasDisponibles.length <= 1) return;
        indiceCamaraActual = (indiceCamaraActual + 1) % camarasDisponibles.length;
        encenderLente(camarasDisponibles[indiceCamaraActual].id);
    }

    function onScanSuccess(decodedText, decodedResult) {
        try {
            html5QrcodeScanner.stop().then(() => {
                setTimeout(() => { procesarUrlPase(decodedText); }, 200);
            }).catch(() => {
                procesarUrlPase(decodedText);
            });
        } catch (e) {
            console.error(e);
        }
    }

    function onScanFailure(error) { }

    function procesarUrlPase(urlTexto) {
        if (!urlTexto.includes("?")) {
            alert("❌ Código QR Inválido o desconocido.");
            regresarAlEscaner(true);
            return;
        }

        const urlParams = new URLSearchParams(urlTexto.substring(urlTexto.indexOf("?")));
        const tipo = urlParams.get("t");
        const nombre = urlParams.get("n");
        const calle = urlParams.get("c");
        const numero = urlParams.get("num");
        const hash = urlParams.get("h");

        if (!calle || !numero || !hash) {
            alert("❌ Datos de acceso corruptos o QR impreciso.");
            regresarAlEscaner(true);
            return;
        }

        const stringFirma = calle.trim().toLowerCase() + "-" + numero.trim().toLowerCase();
        const hashEsperado = btoa(stringFirma).replace(/=/g, "");

        if (hash !== hashEsperado) {
            alert("🚨 ¡ALERTA! Código QR falsificado o firma de seguridad inválida.");
            regresarAlEscaner(true);
            return;
        }

        datosPaseActual = { tipo, nombre, calle, numero };

        if (tipo === 'r') {
            document.getElementById('wrapperEscaner').style.display = 'none';
            document.getElementById('panelResidente').style.display = 'block';
            
            document.getElementById('resNombre').innerText = nombre ? decodeURIComponent(nombre) : "PROPIETARIO REGISTRADO";
            document.getElementById('resDomicilio').innerText = `${calle} #${numero}`;
            
            const ahora = new Date();
            const fechaString = ahora.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const horaString = ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('resFechaHora').innerText = `${fechaString} a las ${horaString}`;
            
        } else {
            document.getElementById('wrapperEscaner').style.display = 'none';
            document.getElementById('panelEvidencias').style.display = 'block';
            
            document.getElementById('evCalle').value = calle;
            document.getElementById('evNumero').value = numero;
            document.getElementById('evNombre').value = "";
            
            fotosCapturadas = { ine: null, carro: null };
            removerMiniatura('btnIne', "🪪 Tomar Foto de la INE");
            removerMiniatura('btnCarro', "🚗 Tomar Foto del Carro / Placas");
        }
    }

    function removerMiniatura(btnId, textoOriginal) {
        const btn = document.getElementById(btnId);
        btn.className = "btn btn-foto";
        btn.innerHTML = `<span>${textoOriginal}</span>`;
    }

    function capturarEvidencia(tipo) {
        tipoEvidenciaActual = tipo;
        document.getElementById('inputCamaraNativa').click();
    }

    document.getElementById('inputCamaraNativa').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const completeBase64 = event.target.result;
            const base64String = completeBase64.split(',')[1];
            
            if (tipoEvidenciaActual === 'ine') {
                fotosCapturadas.ine = base64String;
                desplegarMiniatura('btnIne', completeBase64, "🪪 INE Capturada con Éxito ✅");
            } else if (tipoEvidenciaActual === 'carro') {
                fotosCapturadas.carro = base64String;
                desplegarMiniatura('btnCarro', completeBase64, "🚗 Vehículo Capturado con Éxito ✅");
            }
        };
        reader.readAsDataURL(file);
    });

    function desplegarMiniatura(btnId, imgSrc, textoStatus) {
        const btn = document.getElementById(btnId);
        btn.className = "btn btn-foto capturada";
        btn.innerHTML = `
            <span>${textoStatus}</span>
            <img src="${imgSrc}" class="img-preview" alt="Vista previa">
        `;
    }

    // SOLUCIÓN TOTAL: Se introduce texto y base64 juntos en un único JSON enviado al cuerpo
    function guardarEntradaCaseta() {
        const nombreVisitante = document.getElementById('evNombre').value.trim();
        const calleDestino = document.getElementById('evCalle').value.trim();
        const numeroDestino = document.getElementById('evNumero').value.trim();

        if (!nombreVisitante) {
            alert("⚠️ Por favor escribe el nombre del visitante.");
            return;
        }
        if (!fotosCapturadas.ine) {
            alert("⚠️ Hace falta tomar la fotografía de la INE.");
            return;
        }

        document.getElementById('loadingOverlay').style.display = 'flex';

        // Empaquetamos absolutamente todo en la carga útil (payload body)
        const jsonCompleto = {
            calle: calleDestino,
            numero: numeroDestino,
            nombre: nombreVisitante,
            fotoIne: { base64: fotosCapturadas.ine },
            fotoCarro: fotosCapturadas.carro ? { base64: fotosCapturadas.carro } : null
        };

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(jsonCompleto)
        })
        .then(() => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                alert("🎉 ¡Entrada Guardada con Éxito! Datos e imágenes vinculados.");
                regresarAlEscaner(true);
            }, 1500);
        })
        .catch(err => {
            document.getElementById('loadingOverlay').style.display = 'none';
            console.error(err);
            alert("Error de conexión al enviar el registro.");
        });
    }

    function regresarAlEscaner(forzarCamara) {
        document.getElementById('panelEvidencias').style.display = 'none';
        document.getElementById('panelResidente').style.display = 'none';
        document.getElementById('wrapperEscaner').style.display = 'block';
        document.getElementById('areaControlesCamara').style.display = 'none';
        datosPaseActual = null;
        
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().then(() => {
                if (forzarCamara) setTimeout(() => { iniciarEscaner(); }, 400);
                else document.getElementById('btnIniciar').style.display = 'block';
            }).catch(() => {
                if (forzarCamara) iniciarEscaner();
                else document.getElementById('btnIniciar').style.display = 'block';
            });
        } else {
            if (forzarCamara) iniciarEscaner();
            else document.getElementById('btnIniciar').style.display = 'block';
        }
    }

    function verificarDatosAlCargar() {
        if (window.location.search) {
            procesarUrlPase(window.location.href);
        }
    }

    window.addEventListener('DOMContentLoaded', verificarDatosAlCargar);
</script>

</body>
</html>
